# _TolerantComparator uses methods that don't compile on web.
# TODO(stuartmorgan): Restructure to allow other tests to run; see
# https://github.com/flutter/flutter/issues/157741
test_on: vm

tags:
  golden:
    # Golden comparison tests - can be run separately
    # Run with: flutter test --tags=golden
  capture:
    # Capture tests - generate Flutter golden images
  compare:
    # Compare tests - compare Flutter vs browser goldens
  full:
    # Full pipeline tests - capture and compare in one test
  animation_golden:
    # Animation frame capture - generate Flutter animation frames
    # Run with: flutter test --tags=animation_golden
  animation_compare:
    # Animation frame comparison - compare Flutter vs browser frames
    # Run with: flutter test --tags=animation_compare
  w3c:
    # W3C SVG 1.1 regression tests
    # Run with: RUN_W3C_STATIC=1 flutter test --tags=w3c
