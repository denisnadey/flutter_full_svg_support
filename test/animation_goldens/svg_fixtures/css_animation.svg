<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    @keyframes slideRight {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(500px); }
      100% { transform: translateX(0); }
    }

    @keyframes pulse {
      0%   { transform: scale(1); opacity: 1; }
      25%  { transform: scale(1.5); opacity: 0.6; }
      50%  { transform: scale(0.8); opacity: 1; }
      75%  { transform: scale(1.3); opacity: 0.4; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes colorShift {
      0%   { fill: #e74c3c; }
      33%  { fill: #3498db; }
      66%  { fill: #2ecc71; }
      100% { fill: #e74c3c; }
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .slider {
      animation: slideRight 15s linear forwards;
    }

    .pulser {
      transform-origin: 400px 300px;
      animation: pulse 15s ease-in-out forwards;
    }

    .color-changer {
      animation: colorShift 15s linear forwards;
    }

    .spinner {
      transform-origin: 650px 450px;
      animation: spin 15s linear forwards;
    }
  </style>

  <!-- CSS translateX animation -->
  <rect class="slider" x="50" y="100" width="80" height="80" fill="#f39c12" rx="8"/>

  <!-- CSS scale + opacity animation -->
  <circle class="pulser" cx="400" cy="300" r="60" fill="#9b59b6"/>

  <!-- CSS color animation -->
  <rect class="color-changer" x="100" y="400" width="180" height="120" rx="15"/>

  <!-- CSS rotation -->
  <g class="spinner">
    <rect x="610" y="410" width="80" height="80" fill="#1abc9c" rx="5"/>
  </g>

  <!-- Static reference -->
  <circle cx="650" cy="150" r="40" fill="#bdc3c7" opacity="0.3"/>
</svg>
