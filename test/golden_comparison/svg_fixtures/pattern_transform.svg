<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- pattern with patternTransform rotation -->
  <defs>
    <!-- Base pattern: simple grid -->
    <pattern id="gridBase" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#ffffff"/>
      <rect width="10" height="10" fill="#3366cc"/>
      <rect x="10" y="10" width="10" height="10" fill="#3366cc"/>
    </pattern>
    
    <!-- Pattern with 45 degree rotation -->
    <pattern id="grid45" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="20" height="20" fill="#ffffff"/>
      <rect width="10" height="10" fill="#cc3366"/>
      <rect x="10" y="10" width="10" height="10" fill="#cc3366"/>
    </pattern>
    
    <!-- Pattern with scale and rotation -->
    <pattern id="gridScaleRotate" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(30) scale(1.5)">
      <rect width="20" height="20" fill="#ffffff"/>
      <rect width="10" height="10" fill="#33cc66"/>
      <rect x="10" y="10" width="10" height="10" fill="#33cc66"/>
    </pattern>
    
    <!-- Stripe pattern with rotation -->
    <pattern id="stripesRotate" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="10" height="10" fill="#ffffff"/>
      <rect width="5" height="10" fill="#cc9933"/>
    </pattern>
    
    <!-- Dots with skew transform -->
    <pattern id="dotsSkew" width="15" height="15" patternUnits="userSpaceOnUse" patternTransform="skewX(15)">
      <rect width="15" height="15" fill="#f0f0f0"/>
      <circle cx="7.5" cy="7.5" r="4" fill="#6633cc"/>
    </pattern>
  </defs>
  
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Base grid pattern -->
  <rect x="10" y="10" width="80" height="80" fill="url(#gridBase)"/>
  
  <!-- 45 degree rotated pattern -->
  <rect x="110" y="10" width="80" height="80" fill="url(#grid45)"/>
  
  <!-- Scaled and rotated pattern -->
  <rect x="10" y="110" width="80" height="80" fill="url(#gridScaleRotate)"/>
  
  <!-- Stripe pattern rotated -->
  <circle cx="150" cy="150" r="35" fill="url(#stripesRotate)"/>
  
  <!-- Dots with skew on small shape -->
  <rect x="80" y="80" width="40" height="40" rx="5" fill="url(#dotsSkew)"/>
</svg>
