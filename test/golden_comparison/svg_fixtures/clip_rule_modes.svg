<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Clip-rule test: evenodd vs nonzero -->
    <defs>
        <!-- Star path for clip-rule testing -->
        <clipPath id="starNonzero" clip-rule="nonzero">
            <path
                d="M100,10 L130,90 L200,90 L145,130 L170,200 L100,160 L30,200 L55,130 L0,90 L70,90 Z" />
        </clipPath>

        <clipPath id="starEvenodd" clip-rule="evenodd">
            <path
                d="M100,10 L130,90 L200,90 L145,130 L170,200 L100,160 L30,200 L55,130 L0,90 L70,90 Z" />
        </clipPath>

        <!-- Concentric circles for clip-rule -->
        <clipPath id="circlesNonzero" clip-rule="nonzero">
            <circle cx="100" cy="75" r="70" />
            <circle cx="100" cy="75" r="40" />
        </clipPath>

        <clipPath id="circlesEvenodd" clip-rule="evenodd">
            <circle cx="100" cy="75" r="70" />
            <circle cx="100" cy="75" r="40" />
        </clipPath>

        <!-- Overlapping rectangles -->
        <clipPath id="rectsNonzero" clip-rule="nonzero">
            <rect x="20" y="20" width="80" height="80" />
            <rect x="60" y="60" width="80" height="80" />
        </clipPath>

        <clipPath id="rectsEvenodd" clip-rule="evenodd">
            <rect x="20" y="20" width="80" height="80" />
            <rect x="60" y="60" width="80" height="80" />
        </clipPath>

        <!-- Complex path with self-intersection -->
        <clipPath id="complexNonzero" clip-rule="nonzero">
            <path d="M20,20 L180,20 L20,130 L180,130 Z" />
        </clipPath>

        <clipPath id="complexEvenodd" clip-rule="evenodd">
            <path d="M20,20 L180,20 L20,130 L180,130 Z" />
        </clipPath>
    </defs>

    <text x="50" y="30" font-size="18" fill="#333333">Clip-Rule: nonzero vs evenodd</text>

    <!-- Row 1: Star shapes -->
    <text x="50" y="70" font-size="14" fill="#666666">Star Shape</text>

    <g transform="translate(50, 80)">
        <text x="60" y="0" font-size="11" fill="#999999">nonzero</text>
        <rect width="200" height="200" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#starNonzero)">
            <rect width="200" height="200" fill="#FF6600" />
        </g>
    </g>

    <g transform="translate(300, 80)">
        <text x="60" y="0" font-size="11" fill="#999999">evenodd</text>
        <rect width="200" height="200" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#starEvenodd)">
            <rect width="200" height="200" fill="#FF6600" />
        </g>
    </g>

    <!-- Row 2: Concentric circles -->
    <text x="550" y="70" font-size="14" fill="#666666">Concentric Circles</text>

    <g transform="translate(550, 80)">
        <text x="50" y="0" font-size="11" fill="#999999">nonzero</text>
        <rect width="200" height="150" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#circlesNonzero)">
            <rect width="200" height="150" fill="#0066FF" />
        </g>
    </g>

    <g transform="translate(550, 260)">
        <text x="50" y="0" font-size="11" fill="#999999">evenodd</text>
        <rect width="200" height="150" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#circlesEvenodd)">
            <rect width="200" height="150" fill="#0066FF" />
        </g>
    </g>

    <!-- Row 3: Overlapping rectangles -->
    <text x="50" y="310" font-size="14" fill="#666666">Overlapping Rectangles</text>

    <g transform="translate(50, 320)">
        <text x="50" y="0" font-size="11" fill="#999999">nonzero</text>
        <rect width="200" height="150" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#rectsNonzero)">
            <rect width="200" height="150" fill="#00CC66" />
        </g>
    </g>

    <g transform="translate(300, 320)">
        <text x="50" y="0" font-size="11" fill="#999999">evenodd</text>
        <rect width="200" height="150" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#rectsEvenodd)">
            <rect width="200" height="150" fill="#00CC66" />
        </g>
    </g>

    <!-- Row 4: Self-intersecting path (bowtie) -->
    <text x="50" y="510" font-size="14" fill="#666666">Self-Intersecting Path</text>

    <g transform="translate(50, 520)">
        <text x="60" y="-5" font-size="11" fill="#999999">nonzero</text>
        <rect width="200" height="70" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#complexNonzero)">
            <rect width="200" height="150" fill="#CC00CC" />
        </g>
    </g>

    <g transform="translate(300, 520)">
        <text x="60" y="-5" font-size="11" fill="#999999">evenodd</text>
        <rect width="200" height="70" fill="#EEEEEE" stroke="#CCCCCC" />
        <g clip-path="url(#complexEvenodd)">
            <rect width="200" height="150" fill="#CC00CC" />
        </g>
    </g>
</svg>