<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- animateMotion with only "to" attribute (no from/path) -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
  
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Path indicator showing target position -->
  <line x1="30" y1="30" x2="170" y2="30" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="170" cy="30" r="5" fill="#ccc"/>
  
  <!-- Element with animateMotion using only "to" -->
  <rect x="-10" y="-10" width="20" height="20" fill="#3366cc" rx="3">
    <animateMotion to="170,30" dur="2s" fill="freeze"/>
  </rect>
  
  <!-- Second example: to with rotate -->
  <line x1="30" y1="100" x2="170" y2="140" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="170" cy="140" r="5" fill="#ccc"/>
  
  <polygon points="-10,0 10,0 0,-15" fill="#cc3366">
    <animateMotion to="170,140" dur="2s" fill="freeze" rotate="auto"/>
  </polygon>
  
  <!-- Third example: to with different starting position -->
  <circle cx="30" cy="180" r="5" fill="#ccc"/>
  <line x1="30" y1="180" x2="170" y2="180" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
  
  <g transform="translate(30, 180)">
    <circle r="12" fill="#33cc66">
      <animateMotion to="140,0" dur="2s" fill="freeze"/>
    </circle>
  </g>
</svg>
