<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- CSS cascade through use/shadow boundary test -->
    <style>
        /* Global styles */
        .red-fill { fill: #FF0000; }
        .blue-fill { fill: #0000FF; }
        .green-fill { fill: #00CC00; }
        .orange-fill { fill: #FF6600; }
        
        /* Styles for use elements */
        .use-red use { fill: #FF0000; }
        .use-blue use { fill: #0000FF; }
        
        /* Styles that should cascade */
        .styled-group { fill: #CC00CC; stroke: #333333; stroke-width: 2; }
        
        /* nth-child in use context */
        .multi-child rect:nth-child(odd) { fill: #FF6600; }
        .multi-child rect:nth-child(even) { fill: #0066FF; }
        
        /* Class on use element */
        use.highlight { fill: #FFCC00; }
    </style>

    <defs>
        <!-- Symbol with no fill (inherits) -->
        <symbol id="inheritStar" viewBox="0 0 50 50">
            <polygon points="25,2 31,18 50,18 35,29 41,47 25,36 9,47 15,29 0,18 19,18" />
        </symbol>

        <!-- Symbol with explicit fill -->
        <symbol id="explicitStar" viewBox="0 0 50 50">
            <polygon points="25,2 31,18 50,18 35,29 41,47 25,36 9,47 15,29 0,18 19,18" fill="#666666" />
        </symbol>

        <!-- Symbol with currentColor -->
        <symbol id="currentColorStar" viewBox="0 0 50 50">
            <polygon points="25,2 31,18 50,18 35,29 41,47 25,36 9,47 15,29 0,18 19,18" fill="currentColor" />
        </symbol>

        <!-- Symbol with class -->
        <symbol id="classedCircle" viewBox="0 0 50 50">
            <circle cx="25" cy="25" r="20" class="red-fill" />
        </symbol>

        <!-- Complex symbol with multiple elements -->
        <symbol id="complexGroup" viewBox="0 0 100 50">
            <rect x="5" y="5" width="40" height="40" />
            <circle cx="75" cy="25" r="20" />
        </symbol>

        <!-- Symbol with nested groups -->
        <symbol id="nestedGroups" viewBox="0 0 100 100">
            <g class="inner-group">
                <rect x="10" y="10" width="30" height="30" />
                <rect x="60" y="10" width="30" height="30" />
                <rect x="10" y="60" width="30" height="30" />
                <rect x="60" y="60" width="30" height="30" />
            </g>
        </symbol>
    </defs>

    <text x="50" y="30" font-size="18" fill="#333333">CSS Cascade Through Shadow Boundary</text>

    <!-- Row 1: Fill inheritance -->
    <text x="50" y="70" font-size="14" fill="#666666">Fill Inheritance</text>

    <g transform="translate(50, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">Inherited (red)</text>
        <rect width="80" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#FF0000">
            <use href="#inheritStar" width="80" height="80" />
        </g>
    </g>

    <g transform="translate(150, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">Inherited (blue)</text>
        <rect width="80" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#0000FF">
            <use href="#inheritStar" width="80" height="80" />
        </g>
    </g>

    <g transform="translate(250, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">Explicit (gray)</text>
        <rect width="80" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#FF0000">
            <use href="#explicitStar" width="80" height="80" />
        </g>
    </g>

    <g transform="translate(350, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">currentColor</text>
        <rect width="80" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#00CC00" color="#00CC00">
            <use href="#currentColorStar" width="80" height="80" />
        </g>
    </g>

    <!-- Row 2: Class-based styling -->
    <text x="50" y="210" font-size="14" fill="#666666">Class-Based Styling</text>

    <g transform="translate(50, 230)">
        <text x="0" y="-5" font-size="11" fill="#999999">Class in symbol</text>
        <rect width="80" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <use href="#classedCircle" width="80" height="80" />
    </g>

    <g transform="translate(150, 230)">
        <text x="0" y="-5" font-size="11" fill="#999999">Class on use</text>
        <rect width="80" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <use href="#inheritStar" width="80" height="80" class="highlight" />
    </g>

    <g transform="translate(250, 230)">
        <text x="0" y="-5" font-size="11" fill="#999999">Parent styled</text>
        <rect width="80" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <g class="styled-group">
            <use href="#inheritStar" width="80" height="80" />
        </g>
    </g>

    <!-- Row 3: Complex symbols with cascade -->
    <text x="50" y="350" font-size="14" fill="#666666">Complex Symbol Cascade</text>

    <g transform="translate(50, 370)">
        <text x="0" y="-5" font-size="11" fill="#999999">Group styled</text>
        <rect width="150" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#FF6600">
            <use href="#complexGroup" width="150" height="80" />
        </g>
    </g>

    <g transform="translate(220, 370)">
        <text x="0" y="-5" font-size="11" fill="#999999">Nested groups</text>
        <rect width="120" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#3366FF">
            <use href="#nestedGroups" width="120" height="120" />
        </g>
    </g>

    <!-- Row 4: Multiple uses with different styles -->
    <text x="50" y="520" font-size="14" fill="#666666">Multiple Uses, Different Styles</text>

    <g transform="translate(50, 540)">
        <g fill="#FF0000"><use href="#inheritStar" x="0" y="0" width="50" height="50" /></g>
        <g fill="#FF6600"><use href="#inheritStar" x="55" y="0" width="50" height="50" /></g>
        <g fill="#FFCC00"><use href="#inheritStar" x="110" y="0" width="50" height="50" /></g>
        <g fill="#00CC00"><use href="#inheritStar" x="165" y="0" width="50" height="50" /></g>
        <g fill="#0066FF"><use href="#inheritStar" x="220" y="0" width="50" height="50" /></g>
        <g fill="#6600CC"><use href="#inheritStar" x="275" y="0" width="50" height="50" /></g>
    </g>

    <!-- Stroke cascade -->
    <g transform="translate(550, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">Stroke Cascade</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="none" stroke="#FF0000" stroke-width="3">
            <use href="#inheritStar" x="10" y="10" width="80" height="80" />
        </g>
        <g fill="none" stroke="#0066FF" stroke-width="2">
            <use href="#inheritStar" x="100" y="20" width="60" height="60" />
        </g>
    </g>

    <!-- Opacity cascade -->
    <g transform="translate(550, 240)">
        <text x="0" y="-5" font-size="11" fill="#999999">Opacity Cascade</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#FF6600" opacity="1"><use href="#inheritStar" x="10" y="10" width="60" height="60" /></g>
        <g fill="#FF6600" opacity="0.7"><use href="#inheritStar" x="60" y="20" width="60" height="60" /></g>
        <g fill="#FF6600" opacity="0.4"><use href="#inheritStar" x="110" y="30" width="60" height="60" /></g>
        <g fill="#FF6600" opacity="0.2"><use href="#inheritStar" x="160" y="40" width="50" height="50" /></g>
    </g>

    <!-- Transform cascade -->
    <g transform="translate(550, 390)">
        <text x="0" y="-5" font-size="11" fill="#999999">Transform Cascade</text>
        <rect width="200" height="160" fill="#EEEEEE" stroke="#CCCCCC" />
        <g fill="#00CC66">
            <use href="#inheritStar" x="75" y="55" width="50" height="50" />
            <use href="#inheritStar" x="75" y="55" width="50" height="50" transform="rotate(30, 100, 80)" />
            <use href="#inheritStar" x="75" y="55" width="50" height="50" transform="rotate(60, 100, 80)" />
            <use href="#inheritStar" x="75" y="55" width="50" height="50" transform="rotate(90, 100, 80)" />
        </g>
    </g>
</svg>
