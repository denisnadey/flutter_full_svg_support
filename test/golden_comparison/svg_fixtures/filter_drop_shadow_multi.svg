<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- feDropShadow with multiple stacked shadows -->
  <defs>
    <!-- Single shadow -->
    <filter id="shadow_single" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#333333" flood-opacity="0.5"/>
    </filter>
    
    <!-- Double stacked shadows -->
    <filter id="shadow_double" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="2" stdDeviation="1" flood-color="#ff6600" flood-opacity="0.6"/>
      <feDropShadow dx="5" dy="5" stdDeviation="3" flood-color="#333333" flood-opacity="0.4"/>
    </filter>
    
    <!-- Triple stacked shadows for depth effect -->
    <filter id="shadow_triple" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#0066ff" flood-opacity="0.8"/>
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#6633cc" flood-opacity="0.5"/>
      <feDropShadow dx="6" dy="6" stdDeviation="4" flood-color="#333333" flood-opacity="0.3"/>
    </filter>
    
    <!-- Colored glow shadow -->
    <filter id="shadow_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00ff66" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#00ff66" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Single shadow -->
  <rect x="15" y="15" width="50" height="50" fill="#4488cc" rx="5" filter="url(#shadow_single)"/>
  
  <!-- Double shadow -->
  <rect x="115" y="15" width="50" height="50" fill="#cc4488" rx="5" filter="url(#shadow_double)"/>
  
  <!-- Triple shadow -->
  <circle cx="50" cy="140" r="30" fill="#88cc44" filter="url(#shadow_triple)"/>
  
  <!-- Glow shadow -->
  <circle cx="145" cy="140" r="30" fill="#444444" filter="url(#shadow_glow)"/>
</svg>
