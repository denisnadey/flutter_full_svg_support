<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <!-- clip-path with clip-rule="evenodd" on a complex path -->
    <defs>
        <!-- Complex path with self-intersection - nonzero rule -->
        <clipPath id="complexNonzero" clip-rule="nonzero">
            <path d="M 30,30 L 70,30 L 70,70 L 30,70 Z M 40,40 L 60,40 L 60,60 L 40,60 Z" />
        </clipPath>

        <!-- Same path with evenodd rule - creates hole -->
        <clipPath id="complexEvenodd" clip-rule="evenodd">
            <path d="M 30,30 L 70,30 L 70,70 L 30,70 Z M 40,40 L 60,40 L 60,60 L 40,60 Z" />
        </clipPath>

        <!-- Star with evenodd (creates pentagram effect) -->
        <clipPath id="starEvenodd" clip-rule="evenodd">
            <polygon points="100,10 120,70 180,70 130,100 150,160 100,125 50,160 70,100 20,70 80,70" />
        </clipPath>

        <!-- Star with nonzero (fills completely) -->
        <clipPath id="starNonzero" clip-rule="nonzero">
            <polygon points="100,10 120,70 180,70 130,100 150,160 100,125 50,160 70,100 20,70 80,70" />
        </clipPath>

        <!-- Concentric circles with evenodd -->
        <clipPath id="ringsEvenodd" clip-rule="evenodd">
            <circle cx="150" cy="150" r="40" />
            <circle cx="150" cy="150" r="30" />
            <circle cx="150" cy="150" r="20" />
        </clipPath>
    </defs>

    <rect width="200" height="200" fill="#f5f5f5" />

    <!-- Nonzero: both rects filled -->
    <rect x="20" y="20" width="60" height="60" fill="#3366cc" clip-path="url(#complexNonzero)" />

    <!-- Evenodd: inner rect creates hole -->
    <rect x="80" y="20" width="60" height="60" fill="#cc3366" clip-path="url(#complexEvenodd)"
        transform="translate(60,0)" />

    <!-- Star with evenodd showing pentagram -->
    <g transform="translate(-50, 30) scale(0.5)">
        <rect x="0" y="0" width="200" height="180" fill="#33cc66" clip-path="url(#starEvenodd)" />
    </g>

    <!-- Concentric rings with evenodd -->
    <rect x="100" y="100" width="100" height="100" fill="#cc9933" clip-path="url(#ringsEvenodd)" />
</svg>