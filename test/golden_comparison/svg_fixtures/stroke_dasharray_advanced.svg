<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Advanced stroke-dasharray patterns test -->
    <text x="50" y="30" font-size="18" fill="#333333">Advanced Stroke Dash Patterns</text>

    <!-- Row 1: Simple patterns -->
    <text x="50" y="70" font-size="14" fill="#666666">Simple Dash Patterns</text>

    <g transform="translate(50, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">5</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#333333" stroke-width="4" stroke-dasharray="5" />
    </g>

    <g transform="translate(50, 120)">
        <text x="0" y="-5" font-size="11" fill="#999999">10</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#333333" stroke-width="4" stroke-dasharray="10" />
    </g>

    <g transform="translate(50, 150)">
        <text x="0" y="-5" font-size="11" fill="#999999">20</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#333333" stroke-width="4" stroke-dasharray="20" />
    </g>

    <!-- Row 2: Two-value patterns -->
    <text x="400" y="70" font-size="14" fill="#666666">Two-Value Patterns</text>

    <g transform="translate(400, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">10,5</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#0066FF" stroke-width="4" stroke-dasharray="10,5" />
    </g>

    <g transform="translate(400, 120)">
        <text x="0" y="-5" font-size="11" fill="#999999">20,10</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#0066FF" stroke-width="4" stroke-dasharray="20,10" />
    </g>

    <g transform="translate(400, 150)">
        <text x="0" y="-5" font-size="11" fill="#999999">5,20</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#0066FF" stroke-width="4" stroke-dasharray="5,20" />
    </g>

    <!-- Row 3: Multi-value patterns -->
    <text x="50" y="200" font-size="14" fill="#666666">Multi-Value Patterns</text>

    <g transform="translate(50, 220)">
        <text x="0" y="-5" font-size="11" fill="#999999">10,5,5,5</text>
        <line x1="0" y1="10" x2="700" y2="10" stroke="#FF6600" stroke-width="4" stroke-dasharray="10,5,5,5" />
    </g>

    <g transform="translate(50, 250)">
        <text x="0" y="-5" font-size="11" fill="#999999">20,5,10,5</text>
        <line x1="0" y1="10" x2="700" y2="10" stroke="#FF6600" stroke-width="4" stroke-dasharray="20,5,10,5" />
    </g>

    <g transform="translate(50, 280)">
        <text x="0" y="-5" font-size="11" fill="#999999">30,10,5,10,5,10</text>
        <line x1="0" y1="10" x2="700" y2="10" stroke="#FF6600" stroke-width="4" stroke-dasharray="30,10,5,10,5,10" />
    </g>

    <g transform="translate(50, 310)">
        <text x="0" y="-5" font-size="11" fill="#999999">5,5,5,5,20,5</text>
        <line x1="0" y1="10" x2="700" y2="10" stroke="#FF6600" stroke-width="4" stroke-dasharray="5,5,5,5,20,5" />
    </g>

    <!-- Row 4: Dash offset combinations -->
    <text x="50" y="360" font-size="14" fill="#666666">Dash Offset Variations</text>

    <g transform="translate(50, 380)">
        <text x="0" y="-5" font-size="11" fill="#999999">offset: 0</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#00CC66" stroke-width="4" stroke-dasharray="15,10" stroke-dashoffset="0" />
    </g>

    <g transform="translate(50, 410)">
        <text x="0" y="-5" font-size="11" fill="#999999">offset: 5</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#00CC66" stroke-width="4" stroke-dasharray="15,10" stroke-dashoffset="5" />
    </g>

    <g transform="translate(50, 440)">
        <text x="0" y="-5" font-size="11" fill="#999999">offset: 15</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#00CC66" stroke-width="4" stroke-dasharray="15,10" stroke-dashoffset="15" />
    </g>

    <g transform="translate(50, 470)">
        <text x="0" y="-5" font-size="11" fill="#999999">offset: -10</text>
        <line x1="0" y1="10" x2="300" y2="10" stroke="#00CC66" stroke-width="4" stroke-dasharray="15,10" stroke-dashoffset="-10" />
    </g>

    <!-- Row 5: Shapes with dash patterns -->
    <text x="400" y="360" font-size="14" fill="#666666">Dashed Shapes</text>

    <g transform="translate(400, 380)">
        <rect x="0" y="0" width="100" height="60" fill="none" stroke="#CC00CC" stroke-width="3" stroke-dasharray="10,5" rx="5" />
        <circle cx="160" cy="30" r="28" fill="none" stroke="#CC00CC" stroke-width="3" stroke-dasharray="8,4" />
        <ellipse cx="240" cy="30" rx="35" ry="25" fill="none" stroke="#CC00CC" stroke-width="3" stroke-dasharray="12,6" />
    </g>

    <g transform="translate(400, 460)">
        <polygon points="40,0 80,50 0,50" fill="none" stroke="#6600CC" stroke-width="3" stroke-dasharray="8,4" />
        <path d="M100,25 L130,0 L160,25 L145,50 L115,50 Z" fill="none" stroke="#6600CC" stroke-width="3" stroke-dasharray="6,3" />
        <path d="M180,50 Q210,0 240,50 T300,50" fill="none" stroke="#6600CC" stroke-width="3" stroke-dasharray="10,5" />
    </g>

    <!-- Row 6: Stroke widths with dashes -->
    <text x="50" y="520" font-size="14" fill="#666666">Different Stroke Widths</text>

    <g transform="translate(50, 540)">
        <line x1="0" y1="0" x2="200" y2="0" stroke="#333333" stroke-width="1" stroke-dasharray="10,5" />
        <line x1="0" y1="15" x2="200" y2="15" stroke="#333333" stroke-width="3" stroke-dasharray="10,5" />
        <line x1="0" y1="35" x2="200" y2="35" stroke="#333333" stroke-width="6" stroke-dasharray="10,5" />
        <text x="210" y="5" font-size="10" fill="#666666">1px</text>
        <text x="210" y="20" font-size="10" fill="#666666">3px</text>
        <text x="210" y="40" font-size="10" fill="#666666">6px</text>
    </g>

    <!-- Linecap with dash -->
    <g transform="translate(300, 540)">
        <text x="0" y="-5" font-size="11" fill="#999999">Linecaps</text>
        <line x1="0" y1="10" x2="150" y2="10" stroke="#FF6600" stroke-width="8" stroke-dasharray="20,15" stroke-linecap="butt" />
        <line x1="180" y1="10" x2="330" y2="10" stroke="#FF6600" stroke-width="8" stroke-dasharray="20,15" stroke-linecap="round" />
        <line x1="360" y1="10" x2="450" y2="10" stroke="#FF6600" stroke-width="8" stroke-dasharray="20,15" stroke-linecap="square" />
        <text x="50" y="35" font-size="9" fill="#666666">butt</text>
        <text x="230" y="35" font-size="9" fill="#666666">round</text>
        <text x="380" y="35" font-size="9" fill="#666666">square</text>
    </g>
</svg>
