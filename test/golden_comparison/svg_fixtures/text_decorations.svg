<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Text decorations test: underline, overline, line-through -->
    <text x="50" y="30" font-size="18" fill="#333333">Text Decorations</text>

    <!-- Row 1: Basic decorations -->
    <text x="50" y="70" font-size="14" fill="#666666">Basic Decorations</text>

    <g transform="translate(50, 90)">
        <rect width="200" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="24" fill="#333333" text-decoration="underline">Underline</text>
    </g>

    <g transform="translate(280, 90)">
        <rect width="200" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="24" fill="#333333" text-decoration="overline">Overline</text>
    </g>

    <g transform="translate(510, 90)">
        <rect width="200" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="24" fill="#333333" text-decoration="line-through">
            Strikethrough</text>
    </g>

    <!-- Row 2: Different sizes -->
    <text x="50" y="180" font-size="14" fill="#666666">Different Sizes</text>

    <g transform="translate(50, 200)">
        <rect width="700" height="80" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="30" font-size="14" fill="#333333" text-decoration="underline">Small (14px)</text>
        <text x="180" y="30" font-size="20" fill="#333333" text-decoration="underline">Medium (20px)</text>
        <text x="400" y="40" font-size="28" fill="#333333" text-decoration="underline">Large (28px)</text>
        <text x="10" y="65" font-size="18" fill="#333333" text-decoration="line-through">Line-through
            18px</text>
        <text x="280" y="65" font-size="18" fill="#333333" text-decoration="overline">Overline 18px</text>
    </g>

    <!-- Row 3: Combined decorations -->
    <text x="50" y="310" font-size="14" fill="#666666">Combined Decorations</text>

    <g transform="translate(50, 330)">
        <rect width="250" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="22" fill="#333333" text-decoration="underline overline">Under
            + Over</text>
    </g>

    <g transform="translate(320, 330)">
        <rect width="350" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="22" fill="#333333" text-decoration="underline line-through">Under
            + Through</text>
    </g>

    <!-- Row 4: Colored decorations -->
    <text x="50" y="410" font-size="14" fill="#666666">Colored Text with Decorations</text>

    <g transform="translate(50, 430)">
        <rect width="180" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="22" fill="#FF0000" text-decoration="underline">Red Under</text>
    </g>

    <g transform="translate(250, 430)">
        <rect width="180" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="22" fill="#0066FF" text-decoration="overline">Blue Over</text>
    </g>

    <g transform="translate(450, 430)">
        <rect width="200" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="22" fill="#00CC00" text-decoration="line-through">Green
            Strike</text>
    </g>

    <!-- Row 5: Bold/Italic with decorations -->
    <text x="50" y="510" font-size="14" fill="#666666">Styled Text with Decorations</text>

    <g transform="translate(50, 530)">
        <rect width="200" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="22" font-weight="bold" fill="#333333"
            text-decoration="underline">Bold Under</text>
    </g>

    <g transform="translate(270, 530)">
        <rect width="200" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="22" font-style="italic" fill="#333333"
            text-decoration="underline">Italic Under</text>
    </g>

    <g transform="translate(490, 530)">
        <rect width="260" height="50" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="10" y="35" font-size="20" font-weight="bold" font-style="italic" fill="#FF6600"
            text-decoration="underline">Bold Italic</text>
    </g>
</svg>