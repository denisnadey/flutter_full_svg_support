<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Mixed LTR/RTL text with direction attributes -->
  <!-- Using simple characters to minimize Ahem font differences -->
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Reference boxes -->
  <rect x="10" y="20" width="180" height="40" fill="#e8e8e8" rx="3"/>
  <rect x="10" y="80" width="180" height="40" fill="#e0e0e0" rx="3"/>
  <rect x="10" y="140" width="180" height="40" fill="#d8d8d8" rx="3"/>
  
  <!-- LTR text (default) -->
  <text x="20" y="45" font-size="14" direction="ltr" fill="#3366cc">
    ABC 123 XYZ
  </text>
  
  <!-- RTL text -->
  <text x="180" y="105" font-size="14" direction="rtl" text-anchor="start" fill="#cc3366">
    ABC 123 XYZ
  </text>
  
  <!-- Mixed with unicode-bidi -->
  <text x="100" y="165" font-size="12" text-anchor="middle" fill="#33cc66">
    <tspan direction="ltr">LTR</tspan>
    <tspan direction="rtl" unicode-bidi="embed">RTL</tspan>
    <tspan direction="ltr">LTR</tspan>
  </text>
</svg>
