<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Mask luminance and alpha modes test -->
    <defs>
        <!-- Luminance mask gradients -->
        <linearGradient id="lumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="black" />
            <stop offset="50%" stop-color="gray" />
            <stop offset="100%" stop-color="white" />
        </linearGradient>

        <radialGradient id="radLumGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white" />
            <stop offset="100%" stop-color="black" />
        </radialGradient>

        <!-- Alpha mask gradients -->
        <linearGradient id="alphaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="white" stop-opacity="0" />
            <stop offset="50%" stop-color="white" stop-opacity="0.5" />
            <stop offset="100%" stop-color="white" stop-opacity="1" />
        </linearGradient>

        <radialGradient id="radAlphaGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white" stop-opacity="1" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </radialGradient>

        <!-- Luminance masks -->
        <mask id="lumMaskLinear" maskContentUnits="objectBoundingBox">
            <rect x="0" y="0" width="1" height="1" fill="url(#lumGrad)" />
        </mask>

        <mask id="lumMaskRadial" maskContentUnits="objectBoundingBox">
            <rect x="0" y="0" width="1" height="1" fill="url(#radLumGrad)" />
        </mask>

        <!-- Alpha masks -->
        <mask id="alphaMaskLinear" maskContentUnits="objectBoundingBox">
            <rect x="0" y="0" width="1" height="1" fill="url(#alphaGrad)" />
        </mask>

        <mask id="alphaMaskRadial" maskContentUnits="objectBoundingBox">
            <rect x="0" y="0" width="1" height="1" fill="url(#radAlphaGrad)" />
        </mask>

        <!-- Shape-based masks -->
        <mask id="shapeMask">
            <rect x="0" y="0" width="200" height="120" fill="black" />
            <circle cx="50" cy="60" r="40" fill="white" />
            <circle cx="150" cy="60" r="40" fill="gray" />
        </mask>

        <mask id="textMask">
            <rect x="0" y="0" width="200" height="120" fill="black" />
            <text x="10" y="80" font-size="60" fill="white">TEXT</text>
        </mask>

        <!-- Combined luminance mask -->
        <mask id="combinedLum">
            <rect x="0" y="0" width="200" height="120" fill="url(#lumGrad)" />
            <circle cx="100" cy="60" r="30" fill="black" />
        </mask>
    </defs>

    <text x="50" y="30" font-size="18" fill="#333333">Mask Modes: Luminance &amp; Alpha</text>

    <!-- Row 1: Linear masks -->
    <text x="50" y="70" font-size="14" fill="#666666">Linear Gradient Masks</text>

    <g transform="translate(50, 90)">
        <text x="30" y="-5" font-size="11" fill="#999999">Luminance Linear</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect width="200" height="120" fill="#FF6600" mask="url(#lumMaskLinear)" />
    </g>

    <g transform="translate(300, 90)">
        <text x="40" y="-5" font-size="11" fill="#999999">Alpha Linear</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect width="200" height="120" fill="#0066FF" mask="url(#alphaMaskLinear)" />
    </g>

    <!-- Row 2: Radial masks -->
    <text x="50" y="240" font-size="14" fill="#666666">Radial Gradient Masks</text>

    <g transform="translate(50, 260)">
        <text x="30" y="-5" font-size="11" fill="#999999">Luminance Radial</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect width="200" height="120" fill="#00CC66" mask="url(#lumMaskRadial)" />
    </g>

    <g transform="translate(300, 260)">
        <text x="40" y="-5" font-size="11" fill="#999999">Alpha Radial</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect width="200" height="120" fill="#CC00CC" mask="url(#alphaMaskRadial)" />
    </g>

    <!-- Row 3: Shape-based masks -->
    <text x="50" y="410" font-size="14" fill="#666666">Shape-Based Masks</text>

    <g transform="translate(50, 430)">
        <text x="30" y="-5" font-size="11" fill="#999999">Circle Shapes</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect width="200" height="120" fill="#FF3366" mask="url(#shapeMask)" />
    </g>

    <g transform="translate(300, 430)">
        <text x="30" y="-5" font-size="11" fill="#999999">Text Mask</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect width="200" height="120" fill="#6600CC" mask="url(#textMask)" />
    </g>

    <g transform="translate(550, 430)">
        <text x="20" y="-5" font-size="11" fill="#999999">Combined Luminance</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect width="200" height="120" fill="#FFCC00" mask="url(#combinedLum)" />
    </g>

    <!-- Comparison: masked image -->
    <g transform="translate(550, 90)">
        <text x="20" y="-5" font-size="11" fill="#999999">Complex Content</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <g mask="url(#lumMaskRadial)">
            <rect width="200" height="120" fill="#FF6600" />
            <circle cx="50" cy="60" r="30" fill="#0066FF" />
            <circle cx="150" cy="60" r="30" fill="#00CC66" />
            <rect x="80" y="40" width="40" height="40" fill="#FFCC00" />
        </g>
    </g>

    <g transform="translate(550, 260)">
        <text x="20" y="-5" font-size="11" fill="#999999">Patterns in Mask</text>
        <rect width="200" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <g mask="url(#alphaMaskRadial)">
            <line x1="0" y1="0" x2="200" y2="120" stroke="#333333" stroke-width="3" />
            <line x1="200" y1="0" x2="0" y2="120" stroke="#333333" stroke-width="3" />
            <line x1="0" y1="60" x2="200" y2="60" stroke="#333333" stroke-width="3" />
            <line x1="100" y1="0" x2="100" y2="120" stroke="#333333" stroke-width="3" />
            <circle cx="100" cy="60" r="25" fill="#FF0000" />
        </g>
    </g>
</svg>
