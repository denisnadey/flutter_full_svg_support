<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- feComposite operations test -->
    <defs>
        <!-- Source shapes for compositing -->
        <rect id="rectSource" x="0" y="0" width="80" height="80" fill="#FF6600" />
        <circle id="circleSource" cx="60" cy="60" r="50" fill="#0066FF" />

        <!-- Composite: over -->
        <filter id="compOver" x="0" y="0" width="100%" height="100%">
            <feImage href="#rectSource" result="rect" x="0" y="0" />
            <feImage href="#circleSource" result="circle" x="0" y="0" />
            <feComposite in="circle" in2="rect" operator="over" />
        </filter>

        <!-- Composite: in -->
        <filter id="compIn" x="0" y="0" width="100%" height="100%">
            <feImage href="#rectSource" result="rect" x="0" y="0" />
            <feImage href="#circleSource" result="circle" x="0" y="0" />
            <feComposite in="rect" in2="circle" operator="in" />
        </filter>

        <!-- Composite: out -->
        <filter id="compOut" x="0" y="0" width="100%" height="100%">
            <feImage href="#rectSource" result="rect" x="0" y="0" />
            <feImage href="#circleSource" result="circle" x="0" y="0" />
            <feComposite in="rect" in2="circle" operator="out" />
        </filter>

        <!-- Composite: atop -->
        <filter id="compAtop" x="0" y="0" width="100%" height="100%">
            <feImage href="#rectSource" result="rect" x="0" y="0" />
            <feImage href="#circleSource" result="circle" x="0" y="0" />
            <feComposite in="rect" in2="circle" operator="atop" />
        </filter>

        <!-- Composite: xor -->
        <filter id="compXor" x="0" y="0" width="100%" height="100%">
            <feImage href="#rectSource" result="rect" x="0" y="0" />
            <feImage href="#circleSource" result="circle" x="0" y="0" />
            <feComposite in="rect" in2="circle" operator="xor" />
        </filter>

        <!-- Composite: arithmetic -->
        <filter id="compArith" x="0" y="0" width="100%" height="100%">
            <feImage href="#rectSource" result="rect" x="0" y="0" />
            <feImage href="#circleSource" result="circle" x="0" y="0" />
            <feComposite in="rect" in2="circle" operator="arithmetic" k1="0" k2="0.5" k3="0.5"
                k4="0" />
        </filter>

        <!-- Practical composite filters -->
        <filter id="knockout" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="out" />
        </filter>

        <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
            <feOffset in="blur" dx="2" dy="2" result="offsetBlur" />
            <feComposite in="offsetBlur" in2="SourceAlpha" operator="in" result="innerShadow" />
            <feMerge>
                <feMergeNode in="SourceGraphic" />
                <feMergeNode in="innerShadow" />
            </feMerge>
        </filter>

        <filter id="cutout" x="-10%" y="-10%" width="120%" height="120%">
            <feFlood flood-color="#333333" flood-opacity="0.8" result="flood" />
            <feComposite in="flood" in2="SourceAlpha" operator="in" result="mask" />
            <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur" />
            <feComposite in="mask" in2="blur" operator="out" />
        </filter>
    </defs>

    <text x="50" y="30" font-size="18" fill="#333333">feComposite Operations</text>

    <!-- Row 1: Basic operators -->
    <text x="50" y="70" font-size="14" fill="#666666">Basic Composite Operators</text>

    <!-- Source shapes reference -->
    <g transform="translate(50, 90)">
        <text x="0" y="-5" font-size="11" fill="#999999">Source Shapes</text>
        <rect width="140" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect x="10" y="10" width="80" height="80" fill="#FF6600" />
        <circle cx="90" cy="70" r="50" fill="#0066FF" fill-opacity="0.7" />
    </g>

    <!-- Over -->
    <g transform="translate(220, 90)">
        <text x="30" y="-5" font-size="11" fill="#999999">over</text>
        <rect width="140" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect x="10" y="10" width="80" height="80" fill="#FF6600" />
        <circle cx="90" cy="70" r="50" fill="#0066FF" />
    </g>

    <!-- In -->
    <g transform="translate(390, 90)">
        <text x="40" y="-5" font-size="11" fill="#999999">in</text>
        <rect width="140" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <defs>
            <clipPath id="circleClipComp">
                <circle cx="90" cy="70" r="50" />
            </clipPath>
        </defs>
        <rect x="10" y="10" width="80" height="80" fill="#FF6600" clip-path="url(#circleClipComp)" />
    </g>

    <!-- Out -->
    <g transform="translate(560, 90)">
        <text x="40" y="-5" font-size="11" fill="#999999">out</text>
        <rect width="140" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <defs>
            <mask id="outMaskComp">
                <rect width="140" height="120" fill="white" />
                <circle cx="90" cy="70" r="50" fill="black" />
            </mask>
        </defs>
        <rect x="10" y="10" width="80" height="80" fill="#FF6600" mask="url(#outMaskComp)" />
    </g>

    <!-- Row 2: More operators -->
    <text x="50" y="240" font-size="14" fill="#666666">Additional Operators</text>

    <!-- XOR visualization -->
    <g transform="translate(50, 260)">
        <text x="40" y="-5" font-size="11" fill="#999999">xor</text>
        <rect width="140" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <defs>
            <mask id="xorMask1">
                <rect width="140" height="120" fill="white" />
                <circle cx="90" cy="70" r="50" fill="black" />
            </mask>
            <mask id="xorMask2">
                <rect width="140" height="120" fill="white" />
                <rect x="10" y="10" width="80" height="80" fill="black" />
            </mask>
        </defs>
        <rect x="10" y="10" width="80" height="80" fill="#FF6600" mask="url(#xorMask1)" />
        <circle cx="90" cy="70" r="50" fill="#0066FF" mask="url(#xorMask2)" />
    </g>

    <!-- Atop visualization -->
    <g transform="translate(220, 260)">
        <text x="30" y="-5" font-size="11" fill="#999999">atop</text>
        <rect width="140" height="120" fill="#EEEEEE" stroke="#CCCCCC" />
        <circle cx="90" cy="70" r="50" fill="#0066FF" />
        <defs>
            <clipPath id="atopClip">
                <circle cx="90" cy="70" r="50" />
            </clipPath>
        </defs>
        <rect x="10" y="10" width="80" height="80" fill="#FF6600" clip-path="url(#atopClip)" />
    </g>

    <!-- Row 3: Practical effects -->
    <text x="50" y="410" font-size="14" fill="#666666">Practical Composite Effects</text>

    <g transform="translate(50, 430)">
        <text x="20" y="-5" font-size="11" fill="#999999">Inner Shadow</text>
        <rect width="150" height="100" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect x="25" y="15" width="100" height="70" fill="#00CC66" rx="10"
            filter="url(#innerShadow)" />
    </g>

    <g transform="translate(230, 430)">
        <text x="30" y="-5" font-size="11" fill="#999999">Knockout</text>
        <rect width="150" height="100" fill="#EEEEEE" stroke="#CCCCCC" />
        <circle cx="75" cy="50" r="35" fill="#CC00CC" filter="url(#knockout)" />
    </g>

    <g transform="translate(410, 430)">
        <text x="40" y="-5" font-size="11" fill="#999999">Cutout</text>
        <rect width="150" height="100" fill="#EEEEEE" stroke="#CCCCCC" />
        <rect x="25" y="15" width="100" height="70" fill="#FFCC00" rx="10" filter="url(#cutout)" />
    </g>

    <!-- Filter on text -->
    <g transform="translate(590, 430)">
        <text x="20" y="-5" font-size="11" fill="#999999">On Text</text>
        <rect width="150" height="100" fill="#EEEEEE" stroke="#CCCCCC" />
        <text x="25" y="60" font-size="32" fill="#FF6600" filter="url(#innerShadow)">SVG</text>
    </g>
</svg>