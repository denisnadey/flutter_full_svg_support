<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Stroke patterns test: dasharray, linecap, linejoin, width -->
  
  <!-- Row 1: Stroke widths -->
  <text x="50" y="30" font-size="16" fill="#333333">Stroke Widths</text>
  <line x1="50" y1="60" x2="200" y2="60" stroke="#333333" stroke-width="1"/>
  <text x="220" y="65" font-size="12" fill="#666666">1px</text>
  
  <line x1="50" y1="90" x2="200" y2="90" stroke="#333333" stroke-width="3"/>
  <text x="220" y="95" font-size="12" fill="#666666">3px</text>
  
  <line x1="50" y1="120" x2="200" y2="120" stroke="#333333" stroke-width="5"/>
  <text x="220" y="125" font-size="12" fill="#666666">5px</text>
  
  <line x1="50" y1="150" x2="200" y2="150" stroke="#333333" stroke-width="10"/>
  <text x="220" y="155" font-size="12" fill="#666666">10px</text>
  
  <!-- Row 1 continued: Stroke colors -->
  <line x1="350" y1="60" x2="500" y2="60" stroke="#FF0000" stroke-width="4"/>
  <line x1="350" y1="90" x2="500" y2="90" stroke="#00FF00" stroke-width="4"/>
  <line x1="350" y1="120" x2="500" y2="120" stroke="#0000FF" stroke-width="4"/>
  <line x1="350" y1="150" x2="500" y2="150" stroke="#FF6600" stroke-width="4" stroke-opacity="0.5"/>
  <text x="520" y="155" font-size="12" fill="#666666">50% opacity</text>
  
  <!-- Row 2: Line caps -->
  <text x="50" y="200" font-size="16" fill="#333333">Line Caps</text>
  
  <line x1="50" y1="230" x2="200" y2="230" stroke="#0066FF" stroke-width="15" stroke-linecap="butt"/>
  <text x="220" y="235" font-size="12" fill="#666666">butt</text>
  
  <line x1="50" y1="270" x2="200" y2="270" stroke="#0066FF" stroke-width="15" stroke-linecap="round"/>
  <text x="220" y="275" font-size="12" fill="#666666">round</text>
  
  <line x1="50" y1="310" x2="200" y2="310" stroke="#0066FF" stroke-width="15" stroke-linecap="square"/>
  <text x="220" y="315" font-size="12" fill="#666666">square</text>
  
  <!-- Row 2 continued: Line joins -->
  <text x="350" y="200" font-size="16" fill="#333333">Line Joins</text>
  
  <polyline points="350,320 400,240 450,320" fill="none" stroke="#FF0000" stroke-width="15" stroke-linejoin="miter"/>
  <text x="470" y="280" font-size="12" fill="#666666">miter</text>
  
  <polyline points="520,320 570,240 620,320" fill="none" stroke="#FF0000" stroke-width="15" stroke-linejoin="round"/>
  <text x="640" y="280" font-size="12" fill="#666666">round</text>
  
  <polyline points="690,320 740,240 790,320" fill="none" stroke="#FF0000" stroke-width="15" stroke-linejoin="bevel"/>
  <text x="750" y="320" font-size="12" fill="#666666">bevel</text>
  
  <!-- Row 3: Dash arrays -->
  <text x="50" y="370" font-size="16" fill="#333333">Dash Arrays</text>
  
  <line x1="50" y1="400" x2="300" y2="400" stroke="#333333" stroke-width="3" stroke-dasharray="5"/>
  <text x="320" y="405" font-size="12" fill="#666666">5</text>
  
  <line x1="50" y1="430" x2="300" y2="430" stroke="#333333" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="320" y="435" font-size="12" fill="#666666">10,5</text>
  
  <line x1="50" y1="460" x2="300" y2="460" stroke="#333333" stroke-width="3" stroke-dasharray="15,5,5,5"/>
  <text x="320" y="465" font-size="12" fill="#666666">15,5,5,5</text>
  
  <line x1="50" y1="490" x2="300" y2="490" stroke="#333333" stroke-width="3" stroke-dasharray="20,10,5,10"/>
  <text x="320" y="495" font-size="12" fill="#666666">20,10,5,10</text>
  
  <!-- Row 3 continued: Dash offset -->
  <text x="450" y="370" font-size="16" fill="#333333">Dash Offset</text>
  
  <line x1="450" y1="400" x2="750" y2="400" stroke="#0066FF" stroke-width="3" stroke-dasharray="20,10"/>
  <text x="760" y="405" font-size="12" fill="#666666">offset: 0</text>
  
  <line x1="450" y1="430" x2="750" y2="430" stroke="#0066FF" stroke-width="3" stroke-dasharray="20,10" stroke-dashoffset="5"/>
  <text x="760" y="435" font-size="12" fill="#666666">offset: 5</text>
  
  <line x1="450" y1="460" x2="750" y2="460" stroke="#0066FF" stroke-width="3" stroke-dasharray="20,10" stroke-dashoffset="15"/>
  <text x="760" y="465" font-size="12" fill="#666666">offset: 15</text>
  
  <!-- Row 4: Dashed shapes -->
  <text x="50" y="530" font-size="16" fill="#333333">Dashed Shapes</text>
  
  <rect x="50" y="550" width="80" height="40" fill="none" stroke="#FF6600" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="200" cy="570" r="25" fill="none" stroke="#00CC00" stroke-width="3" stroke-dasharray="10,5"/>
  <ellipse cx="300" cy="570" rx="40" ry="20" fill="none" stroke="#0066FF" stroke-width="2" stroke-dasharray="5,3"/>
  
  <path d="M380,550 Q450,530 450,590 T520,570" fill="none" stroke="#FF00FF" stroke-width="3" stroke-dasharray="12,6" stroke-linecap="round"/>
</svg>
