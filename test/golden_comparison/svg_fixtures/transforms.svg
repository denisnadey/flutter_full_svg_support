<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Transforms test: translate, rotate, scale, skew -->

    <!-- Reference grid lines -->
    <line x1="0" y1="150" x2="800" y2="150" stroke="#CCCCCC" stroke-dasharray="4" />
    <line x1="0" y1="300" x2="800" y2="300" stroke="#CCCCCC" stroke-dasharray="4" />
    <line x1="0" y1="450" x2="800" y2="450" stroke="#CCCCCC" stroke-dasharray="4" />

    <!-- Row 1: Translate -->
    <text x="50" y="30" font-size="16" fill="#333333">Translate</text>
    <rect x="50" y="50" width="60" height="60" fill="#FF0000" />
    <rect x="50" y="50" width="60" height="60" fill="#00FF00" opacity="0.7"
        transform="translate(80, 20)" />
    <rect x="50" y="50" width="60" height="60" fill="#0000FF" opacity="0.7"
        transform="translate(160, 40)" />

    <rect x="350" y="50" width="60" height="60" fill="#FF6600" />
    <rect x="350" y="50" width="60" height="60" fill="#6600FF" opacity="0.7"
        transform="translate(100, 0)" />
    <rect x="350" y="50" width="60" height="60" fill="#00FF66" opacity="0.7"
        transform="translate(0, 50)" />

    <!-- Row 2: Rotate -->
    <text x="50" y="180" font-size="16" fill="#333333">Rotate</text>
    <rect x="100" y="200" width="80" height="40" fill="#FF0000" />
    <rect x="100" y="200" width="80" height="40" fill="#00FF00" opacity="0.7"
        transform="rotate(15, 140, 220)" />
    <rect x="100" y="200" width="80" height="40" fill="#0000FF" opacity="0.7"
        transform="rotate(30, 140, 220)" />
    <rect x="100" y="200" width="80" height="40" fill="#FF00FF" opacity="0.7"
        transform="rotate(45, 140, 220)" />

    <circle cx="450" cy="220" r="40" fill="#FF6600" stroke="#333333" stroke-width="2" />
    <g transform="rotate(45, 450, 220)">
        <rect x="430" y="200" width="40" height="40" fill="#333333" />
    </g>

    <g transform="rotate(90, 650, 220)">
        <rect x="620" y="200" width="60" height="30" fill="#0066FF" />
        <text x="625" y="220" font-size="12" fill="white">Rotated</text>
    </g>

    <!-- Row 3: Scale -->
    <text x="50" y="330" font-size="16" fill="#333333">Scale</text>
    <rect x="50" y="350" width="40" height="40" fill="#FF0000" />
    <rect x="120" y="350" width="40" height="40" fill="#00FF00" transform="scale(1.5)" />
    <rect x="250" y="350" width="40" height="40" fill="#0000FF" transform="scale(0.5)" />

    <g transform="scale(2, 1)">
        <rect x="200" y="370" width="30" height="30" fill="#FF6600" />
    </g>

    <g transform="scale(1, 2)">
        <rect x="500" y="180" width="30" height="30" fill="#6600FF" />
    </g>

    <!-- Row 4: Skew -->
    <text x="50" y="480" font-size="16" fill="#333333">Skew</text>
    <rect x="50" y="500" width="80" height="50" fill="#FF0000" />
    <rect x="180" y="500" width="80" height="50" fill="#00FF00" transform="skewX(20)" />
    <rect x="350" y="500" width="80" height="50" fill="#0000FF" transform="skewY(15)" />

    <!-- Combined transforms -->
    <text x="500" y="480" font-size="16" fill="#333333">Combined</text>
    <rect x="500" y="500" width="60" height="40" fill="#FF6600"
        transform="translate(50, 10) rotate(15) scale(1.2)" />
    <rect x="650" y="500" width="60" height="40" fill="#6600FF"
        transform="rotate(30) translate(10, 10)" />
</svg>