<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- feTurbulence with stitchTiles for seamless tiling -->
  <defs>
    <!-- Turbulence no stitch -->
    <filter id="turb_nostitch" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" stitchTiles="noStitch" result="turb"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <!-- Turbulence with stitch -->
    <filter id="turb_stitch" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" stitchTiles="stitch" result="turb"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <!-- fractalNoise with stitch -->
    <filter id="fractal_stitch" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Left: No stitch -->
  <rect x="10" y="30" width="80" height="60" filter="url(#turb_nostitch)"/>
  
  <!-- Right: With stitch -->
  <rect x="110" y="30" width="80" height="60" filter="url(#turb_stitch)"/>
  
  <!-- Bottom: fractalNoise with stitch -->
  <rect x="55" y="120" width="90" height="60" filter="url(#fractal_stitch)"/>
</svg>
