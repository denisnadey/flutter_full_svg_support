<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <!-- feMorphology edge cases: dilate/erode with various radius values -->
    <defs>
        <!-- Dilate with fractional radius -->
        <filter id="dilate_frac" x="-20%" y="-20%" width="140%" height="140%">
            <feMorphology operator="dilate" radius="1.5" />
        </filter>
        <!-- Erode with zero radius (should have no effect) -->
        <filter id="erode_zero" x="-20%" y="-20%" width="140%" height="140%">
            <feMorphology operator="erode" radius="0" />
        </filter>
        <!-- Dilate with asymmetric radius -->
        <filter id="dilate_asym" x="-20%" y="-20%" width="140%" height="140%">
            <feMorphology operator="dilate" radius="3 1" />
        </filter>
        <!-- Erode with larger radius -->
        <filter id="erode_large" x="-20%" y="-20%" width="140%" height="140%">
            <feMorphology operator="erode" radius="2" />
        </filter>
    </defs>

    <rect width="200" height="200" fill="#f5f5f5" />

    <!-- Row 1: Original and dilate fractional -->
    <g transform="translate(25, 25)">
        <rect width="60" height="60" fill="#3366cc" rx="5" />
    </g>
    <g transform="translate(115, 25)">
        <rect width="60" height="60" fill="#3366cc" rx="5" filter="url(#dilate_frac)" />
    </g>

    <!-- Row 2: Erode zero and asymmetric dilate -->
    <g transform="translate(25, 115)">
        <circle cx="30" cy="30" r="25" fill="#cc3366" filter="url(#erode_zero)" />
    </g>
    <g transform="translate(115, 115)">
        <circle cx="30" cy="30" r="25" fill="#cc3366" filter="url(#dilate_asym)" />
    </g>
</svg>