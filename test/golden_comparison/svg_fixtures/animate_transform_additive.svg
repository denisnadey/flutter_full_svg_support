<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- animateTransform with additive="sum" and accumulate="sum" -->
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Reference grid -->
  <line x1="100" y1="0" x2="100" y2="200" stroke="#eee" stroke-width="1"/>
  <line x1="0" y1="100" x2="200" y2="100" stroke="#eee" stroke-width="1"/>
  
  <!-- Element with additive rotate -->
  <g transform="translate(50, 50)">
    <rect x="-20" y="-20" width="40" height="40" fill="#3366cc" rx="3">
      <!-- Base rotation -->
      <animateTransform attributeName="transform" type="rotate" from="0" to="45" dur="2s" fill="freeze"/>
      <!-- Additive rotation -->
      <animateTransform attributeName="transform" type="rotate" from="0" to="30" dur="2s" fill="freeze" additive="sum"/>
    </rect>
  </g>
  
  <!-- Element with additive scale -->
  <g transform="translate(150, 50)">
    <circle r="20" fill="#cc3366">
      <!-- Base scale -->
      <animateTransform attributeName="transform" type="scale" from="1" to="1.2" dur="2s" fill="freeze"/>
      <!-- Additive scale -->
      <animateTransform attributeName="transform" type="scale" from="1" to="0.8" dur="2s" fill="freeze" additive="sum"/>
    </circle>
  </g>
  
  <!-- Element with accumulate on repeated animation -->
  <g transform="translate(50, 150)">
    <polygon points="-15,15 15,15 0,-15" fill="#33cc66">
      <animateTransform attributeName="transform" type="rotate" from="0" to="30" dur="0.5s" repeatCount="3" accumulate="sum" fill="freeze"/>
    </polygon>
  </g>
  
  <!-- Element with both additive and accumulate -->
  <g transform="translate(150, 150)">
    <rect x="-15" y="-15" width="30" height="30" fill="#cc9933" rx="2">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,0" dur="0.5s" repeatCount="2" additive="sum" accumulate="sum" fill="freeze"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="15" dur="1s" fill="freeze" additive="sum"/>
    </rect>
  </g>
</svg>
