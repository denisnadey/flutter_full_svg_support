    <filter id="ds" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="4" dy="4" stdDeviation="3"
                    flood-color="#2c3e50" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="15" y="15" width="55" height="55" rx="10" fill="#3498db" filter="url(#ds)"/>
  <circle cx="65" cy="65" r="22" fill="#e74c3c" filter="url(#ds)"/>
</svg>
