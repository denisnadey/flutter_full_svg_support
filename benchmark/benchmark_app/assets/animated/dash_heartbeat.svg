<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Placeholder: stroke-dashoffset heartbeat animation -->
  <path d="M10 50 L25 50 L30 30 L35 70 L40 20 L45 80 L50 50 L90 50"
        fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="160" stroke-dashoffset="160">
    <animate attributeName="stroke-dashoffset"
      values="160;0;0;160" dur="2s" repeatCount="indefinite"
      keyTimes="0;0.5;0.8;1" calcMode="spline"
      keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.6 1"/>
  </path>
  <circle cx="50" cy="50" r="3" fill="#e74c3c">
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"
      keyTimes="0;0.5;0.8;1"/>
  </circle>
</svg>
