<!-- Source: generated for full_svg_flutter benchmarks -->
<!-- Tests: textPath along a curved path, regular text with tspan elements, baseline shifts -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <!-- Curved arc path for text to follow -->
    <path id="arcPath"
      d="M30,170 C80,60 160,30 200,30 C240,30 320,60 370,170"/>

    <!-- Wavy path for second text -->
    <path id="wavyPath"
      d="M10,110 C50,80 90,140 130,110 C170,80 210,140 250,110 C290,80 330,140 370,110"/>
  </defs>

  <rect width="400" height="200" fill="#fafaf2"/>

  <!-- Text following the arc path -->
  <text font-family="Georgia, serif" font-size="15" fill="#1a237e" letter-spacing="1">
    <textPath href="#arcPath" startOffset="5%">
      Text flowing along a curved SVG path — textPath element
    </textPath>
  </text>

  <!-- Text following the wavy path -->
  <text font-family="Arial, sans-serif" font-size="11" fill="#880e4f" letter-spacing="0.5">
    <textPath href="#wavyPath" startOffset="0%">
      Wavy text following a sinusoidal guide path in SVG
    </textPath>
  </text>

  <!-- Regular text with tspan for mixed styles -->
  <text x="20" y="155" font-family="sans-serif" font-size="13" fill="#212121">
    <tspan font-weight="bold" fill="#d32f2f">Bold red</tspan>
    <tspan dx="6" fill="#1565c0">normal blue</tspan>
    <tspan dx="6" font-style="italic" fill="#2e7d32">italic green</tspan>
    <tspan dx="6" text-decoration="underline" fill="#6a1b9a">underline</tspan>
  </text>

  <!-- Superscript / subscript via tspan dy -->
  <text x="20" y="185" font-family="monospace" font-size="13" fill="#333">
    <tspan>H</tspan><tspan dy="4" font-size="9">2</tspan><tspan dy="-4">O + CO</tspan>
    <tspan dy="-5" font-size="9">2</tspan><tspan dy="5"> = chemistry</tspan>
  </text>
</svg>
