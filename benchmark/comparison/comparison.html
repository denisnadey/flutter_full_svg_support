<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SVG Comparison · Chrome native</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  /*
   * SVG is injected inline (not in an iframe).
   *
   * Why not iframe: an iframe creates a separate document with its own
   * rendering pipeline. The parent page's rAF loop and the iframe's SMIL
   * animations both need main-thread time — they compete, causing lag.
   * Opening the SVG file directly in Chrome is smooth because nothing else
   * is fighting for the main thread.
   *
   * Inline SVG runs in the same compositor context as the rest of this
   * document, so the rAF here measures the same ticks as the SVG animations.
   * contain:strict prevents the SVG's layout/paint from reflowing the HUD.
   */
  #svg-host {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #000;
    contain: strict;
  }
  #svg-host svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /*
   * HUD layers — each on its own GPU compositor layer via transform:translateZ(0).
   * pointer-events:none so they never intercept clicks on the SVG.
   */
  .hud {
    position: fixed;
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 6px;
    color: #fff;
    padding: 8px 10px;
    line-height: 1.45;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    z-index: 9999;
    user-select: none;
    pointer-events: none;
    transform: translateZ(0);
    will-change: transform;
  }
  .hud .label  { color: rgba(255, 255, 255, 0.55); font-size: 10px; letter-spacing: 0.5px; }
  .hud .fps    { font-weight: 700; font-size: 13px; color: var(--fps-color, #7fff7f); }
  .hud .row    { display: flex; gap: 8px; }
  .hud .row span:first-child { color: rgba(255, 255, 255, 0.55); }
  .hud.hidden  { display: none; }

  #fps-hud  { top: 12px;    right: 12px; min-width: 168px; }
  #help-hud { bottom: 12px; right: 12px; color: rgba(255, 255, 255, 0.45); font-size: 10px; }

  #title-strip {
    position: fixed;
    top: 12px;
    left: 12px;
    color: rgba(127, 255, 255, 0.85);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(0, 255, 255, 0.5);
    z-index: 9999;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
  <div id="svg-host"></div>

  <div id="title-strip">CHROMIUM · NATIVE BLINK</div>

  <div id="fps-hud" class="hud">
    <div class="label">CHROME</div>
    <div class="fps">FPS: <span id="fps">--</span></div>
    <div class="row"><span>avg frame</span><span id="avg">--</span> ms</div>
    <div class="row"><span>p99 frame</span><span id="p99">--</span> ms</div>
    <div class="row"><span>jank/60Hz</span><span id="jank60">--</span></div>
    <div class="row"><span>jank/120Hz</span><span id="jank120">--</span></div>
  </div>

  <div id="help-hud" class="hud">[M] toggle HUD &nbsp;·&nbsp; [V] verbose &nbsp;·&nbsp; [R] reload SVG</div>

  <script>
    const SVG_SRC = '../assets/stress/galactic_storm.svg';
    const host = document.getElementById('svg-host');

    function loadSVG() {
      host.innerHTML = '';
      return fetch(SVG_SRC)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(text => { host.innerHTML = text; })
        .catch(() => {
          // file:// fallback: fetch is blocked by CORS on file:// origins.
          // <img> loads SVG without CORS and Chrome animates it on the
          // compositor thread — smooth, no main-thread competition.
          // (Metrics via rAF are still valid; they measure this document's
          // compositor ticks, which is the same cadence as the SVG image.)
          const img = document.createElement('img');
          img.src = SVG_SRC;
          img.style.cssText = 'width:100%;height:100%;display:block;object-fit:cover;';
          host.appendChild(img);
        });
    }
    loadSVG();

    // ---------------------------------------------------------------------------
    // FPS instrumentation
    //
    // ALL DOM mutations happen inside the rAF callback — never in setInterval.
    // setInterval fires at arbitrary times relative to the compositor clock and
    // can trigger a mid-frame repaint → flicker. rAF callbacks are always
    // batched with the current frame's paint.
    //
    // rAF passes a DOMHighResTimeStamp; we use it directly, no performance.now().
    //
    // The telemetry network POST keeps its own setInterval (every 5 s) since
    // fetch() is async I/O and never touches the render pipeline.
    // ---------------------------------------------------------------------------
    const WIN = 240;    // sliding window: ~4 s @60Hz, ~2 s @120Hz
    const deltas = [];
    let lastT      = 0; // 0 = first tick not yet seen
    let lastReport = 0;
    let frameCount = 0;
    let displayedFps = 0;

    const telemetryUrl = new URLSearchParams(location.search).get('telemetry');
    const telemetryBuffer = [];

    const $ = id => document.getElementById(id);
    let verbose = true;

    function report(now) {
      const dt = now - lastReport;
      lastReport = now;
      displayedFps = (frameCount * 1000) / Math.max(dt, 1);
      frameCount = 0;

      $('fps').textContent = displayedFps.toFixed(1);
      document.documentElement.style.setProperty('--fps-color',
        displayedFps >= 55 ? '#7fff7f' :
        displayedFps >= 40 ? '#ffcf00' : '#ff5050');

      if (verbose && deltas.length) {
        const sorted = [...deltas].sort((a, b) => a - b);
        const n   = sorted.length;
        const avg = sorted.reduce((s, x) => s + x, 0) / n;
        const p99 = sorted[Math.min(n - 1, Math.floor(n * 0.99))];
        const j60  = deltas.reduce((c, d) => c + (d > 16.67 ? 1 : 0), 0);
        const j120 = deltas.reduce((c, d) => c + (d > 8.33  ? 1 : 0), 0);
        $('avg').textContent     = avg.toFixed(1);
        $('p99').textContent     = p99.toFixed(1);
        $('jank60').textContent  = j60;
        $('jank120').textContent = j120;
      }
    }

    function tick(now) {
      if (lastT > 0) {
        const d = now - lastT;
        if (d > 0 && d < 500) {
          deltas.push(d);
          if (deltas.length > WIN) deltas.shift();
          frameCount++;
          if (telemetryUrl) telemetryBuffer.push(d);
        }
      }
      lastT = now;
      if (now - lastReport >= 500) report(now);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    if (telemetryUrl) {
      let posting = false;
      setInterval(async () => {
        if (posting || telemetryBuffer.length === 0) return;
        posting = true;
        const batch = telemetryBuffer.splice(0);
        try {
          await fetch(telemetryUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              label: 'chrome_browser',
              timestamp_ms: Date.now(),
              frame_count: batch.length,
              deltas_ms: batch,
            }),
            keepalive: true,
          });
        } catch (_) {}
        finally { posting = false; }
      }, 5000);
    }

    document.addEventListener('keydown', e => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === 'm' || e.key === 'M') {
        $('fps-hud').classList.toggle('hidden');
      } else if (e.key === 'v' || e.key === 'V') {
        verbose = !verbose;
        document.querySelectorAll('#fps-hud .row').forEach(r => {
          r.style.display = verbose ? '' : 'none';
        });
      } else if (e.key === 'r' || e.key === 'R') {
        loadSVG();
      }
    });
  </script>
</body>
</html>
