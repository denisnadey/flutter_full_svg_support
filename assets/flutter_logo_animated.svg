<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -14 192 230" width="192" height="230">
  <!--
    Animated Flutter logo - full_svg_flutter demo asset.
    The four facets slide together with a staggered ease-out, a light
    sheen sweeps across on a loop, and the whole mark floats gently.
    Pure SVG + SMIL: no GIF, no Lottie, no JavaScript, no WebView.
    Every facet is fully opaque at all times, so any frame - even a
    paused one - shows the complete Flutter logo.
  -->
  <defs>
    <linearGradient id="flCard" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1A2C4E"/>
      <stop offset="1" stop-color="#0A1020"/>
    </linearGradient>
    <radialGradient id="flHalo" cx="0.5" cy="0.46" r="0.58">
      <stop offset="0" stop-color="#47C5FB" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#47C5FB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#47C5FB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flCrease" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0.1" stop-color="#01243F" stop-opacity="0.55"/>
      <stop offset="0.9" stop-color="#01243F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flSheen" gradientUnits="userSpaceOnUse"
        x1="0" y1="0" x2="74" y2="74" gradientTransform="translate(-190 -190)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-190 -190; -190 -190; 250 250; 250 250"
        keyTimes="0; 0.13; 0.5; 1"
        calcMode="spline" keySplines="0 0 1 1; 0.42 0 0.58 1; 0 0 1 1"
        begin="1.5s" dur="3.8s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- hero card -->
  <rect x="-12" y="-14" width="192" height="230" rx="27"
    fill="url(#flCard)" stroke="#3C5C88" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- halo behind the logo -->
  <rect x="-12" y="-14" width="192" height="230" rx="27" fill="url(#flHalo)"/>

  <!-- Flutter logo: slides into place once, then floats gently -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -5; 0 0" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
      begin="1.15s" dur="4.2s" repeatCount="indefinite"/>

    <!-- upper beam -->
    <path fill="#47C5FB" d="M37.7 128.9 9.8 101 100.4 10.4 156.2 10.4Z">
      <animateTransform attributeName="transform" type="translate"
        values="18 -18; -3 3; 0 0" keyTimes="0;0.78;1"
        calcMode="spline" keySplines="0.12 0.66 0.3 1; 0.4 0 0.5 1"
        begin="0s" dur="0.74s" fill="freeze"/>
    </path>

    <!-- lower beam -->
    <path fill="#47C5FB" d="M156.2 94 100.4 94 79.5 114.9 107.4 142.8Z">
      <animateTransform attributeName="transform" type="translate"
        values="18 -18; 18 -18; -3 3; 0 0" keyTimes="0;0.149;0.813;1"
        calcMode="spline" keySplines="0 0 1 1; 0.12 0.66 0.3 1; 0.4 0 0.5 1"
        begin="0s" dur="0.87s" fill="freeze"/>
    </path>

    <!-- navy fold -->
    <path fill="#01579B" d="M79.5 170.7 100.4 191.6 156.2 191.6 107.4 142.8Z">
      <animateTransform attributeName="transform" type="translate"
        values="18 -18; 18 -18; -3 3; 0 0" keyTimes="0;0.345;0.856;1"
        calcMode="spline" keySplines="0 0 1 1; 0.12 0.66 0.3 1; 0.4 0 0.5 1"
        begin="0s" dur="1.13s" fill="freeze"/>
    </path>

    <!-- middle facet (the elbow) -->
    <path fill="#47C5FB" d="M51.66 142.82 79.52 114.96 107.38 142.82 79.52 170.68Z">
      <animateTransform attributeName="transform" type="translate"
        values="18 -18; 18 -18; -3 3; 0 0" keyTimes="0;0.26;0.837;1"
        calcMode="spline" keySplines="0 0 1 1; 0.12 0.66 0.3 1; 0.4 0 0.5 1"
        begin="0s" dur="1s" fill="freeze"/>
    </path>

    <!-- fold crease shadow (travels with the fold) -->
    <path fill="url(#flCrease)" d="M79.5 170.7 120.9 156.4 107.4 142.8Z">
      <animateTransform attributeName="transform" type="translate"
        values="18 -18; 18 -18; -3 3; 0 0" keyTimes="0;0.345;0.856;1"
        calcMode="spline" keySplines="0 0 1 1; 0.12 0.66 0.3 1; 0.4 0 0.5 1"
        begin="0s" dur="1.13s" fill="freeze"/>
    </path>

    <!-- sheen sweep: all four facets in one path so overlaps stay even -->
    <path fill="url(#flSheen)"
      d="M37.7 128.9 9.8 101 100.4 10.4 156.2 10.4Z
         M156.2 94 100.4 94 79.5 114.9 107.4 142.8Z
         M79.5 170.7 100.4 191.6 156.2 191.6 107.4 142.8Z
         M51.66 142.82 79.52 114.96 107.38 142.82 79.52 170.68Z"/>
  </g>
</svg>
