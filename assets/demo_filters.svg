<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.42
                0 0 0 0 0.39
                0 0 0 0 1
                0 0 0 1 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#6C63FF" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF6B9D"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3EC6E0"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
  </defs>

  <!-- feGaussianBlur + feColorMatrix glow -->
  <g filter="url(#glow)">
    <circle cx="40" cy="60" r="30" fill="url(#g1)">
      <animate attributeName="r" values="25;32;25" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- feDropShadow on rect -->
  <rect x="90" y="30" width="60" height="60" rx="12" fill="url(#g2)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 120 60" to="360 120 60" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- feBlend layered text label -->
  <text x="180" y="55" font-family="monospace" font-size="11" fill="#6C63FF" font-weight="bold"
    filter="url(#glow)">feGaussianBlur
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="180" y="72" font-family="monospace" font-size="11" fill="#3EC6E0"
    filter="url(#glow)">feColorMatrix
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="180" y="89" font-family="monospace" font-size="11" fill="#FF6B9D"
    filter="url(#glow)">feDropShadow
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </text>
</svg>
