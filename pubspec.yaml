name: full_svg_flutter
description: Animated SVG renderer for Flutter with SMIL, CSS keyframes, filters, path morphing, playback control, and flutter_svg-compatible API.
repository: https://github.com/denisnadey/flutter_full_svg_support
homepage: https://github.com/denisnadey/flutter_full_svg_support
issue_tracker: https://github.com/denisnadey/flutter_full_svg_support/issues
documentation: https://github.com/denisnadey/flutter_full_svg_support/tree/main/doc
version: 1.0.2

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  es_compression: ^2.0.0
  http: ^1.0.0
  meta: ^1.17.0
  vector_graphics: ^1.1.13
  vector_graphics_codec: ^1.1.11+1
  vector_graphics_compiler: ^1.1.14
  xml: '>=6.0.0 <8.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_svg_example:
    path: example

topics:
  - svg
  - vector-graphics
  - animation
  - smil
  - flutter
