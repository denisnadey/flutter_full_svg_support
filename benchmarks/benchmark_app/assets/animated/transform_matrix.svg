<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Placeholder: animateTransform matrix animation -->
  <rect x="35" y="35" width="30" height="30" fill="#f39c12" rx="4">
    <animateTransform attributeName="transform" type="rotate"
      from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="40" y="40" width="20" height="20" fill="#e67e22" rx="2">
    <animateTransform attributeName="transform" type="rotate"
      from="360 50 50" to="0 50 50" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="50" cy="50" r="5" fill="#fff">
    <animate attributeName="r" values="5;8;5" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
