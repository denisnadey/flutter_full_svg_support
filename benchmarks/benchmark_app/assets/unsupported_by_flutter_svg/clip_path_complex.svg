<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Complex clipPath with nested shapes — may render incorrectly in flutter_svg -->
  <defs>
    <clipPath id="starClip">
      <polygon points="50,8 63,35 92,35 69,54 78,82 50,63 22,82 31,54 8,35 37,35"/>
    </clipPath>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="38"/>
    </clipPath>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
  </defs>
  <!-- Background clipped to circle -->
  <rect width="100" height="100" fill="url(#grad)" clip-path="url(#circleClip)"/>
  <!-- Striped overlay clipped to star -->
  <g clip-path="url(#starClip)">
    <rect width="100" height="100" fill="#fdcb6e" opacity="0.7"/>
    <line x1="0" y1="20" x2="100" y2="20" stroke="#e17055" stroke-width="4"/>
    <line x1="0" y1="40" x2="100" y2="40" stroke="#e17055" stroke-width="4"/>
    <line x1="0" y1="60" x2="100" y2="60" stroke="#e17055" stroke-width="4"/>
    <line x1="0" y1="80" x2="100" y2="80" stroke="#e17055" stroke-width="4"/>
  </g>
</svg>
