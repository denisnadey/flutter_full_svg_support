<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- animateMotion along elliptical orbit — not supported by flutter_svg -->
  <ellipse cx="50" cy="50" rx="38" ry="22" fill="none"
           stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- orbiting dot -->
  <circle r="5" fill="#e74c3c">
    <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbitPath"/>
    </animateMotion>
  </circle>
  <path id="orbitPath"
        d="M88 50 C88 28 69 28 50 28 C31 28 12 28 12 50 C12 72 31 72 50 72 C69 72 88 72 88 50 Z"
        fill="none"/>
  <!-- center planet -->
  <circle cx="50" cy="50" r="8" fill="#3498db"/>
  <circle cx="50" cy="50" r="4" fill="#2980b9"/>
</svg>
