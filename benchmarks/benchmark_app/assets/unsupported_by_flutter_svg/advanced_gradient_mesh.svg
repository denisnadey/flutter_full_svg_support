<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Complex radial + linear gradient composition — may render incorrectly in flutter_svg -->
  <defs>
    <radialGradient id="rg1" cx="30%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#fd79a8"/>
      <stop offset="50%"  stop-color="#e84393"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="rg2" cx="70%" cy="70%" r="55%">
      <stop offset="0%"   stop-color="#00cec9"/>
      <stop offset="100%" stop-color="#0984e3" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fdcb6e"/>
      <stop offset="100%" stop-color="#e17055" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#lg1)"/>
  <ellipse cx="35" cy="35" rx="40" ry="40" fill="url(#rg1)" opacity="0.8"/>
  <ellipse cx="65" cy="65" rx="38" ry="38" fill="url(#rg2)" opacity="0.75"/>
</svg>
