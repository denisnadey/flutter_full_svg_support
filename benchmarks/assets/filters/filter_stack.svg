<!-- Source: generated for full_svg_flutter benchmarks -->
<!-- Tests: complex filter chain: feGaussianBlur -> feColorMatrix -> feComposite -> feDropShadow applied to a group -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Complex filter chain -->
    <filter id="complexStack" x="-20%" y="-20%" width="140%" height="140%"
            color-interpolation-filters="sRGB">
      <!-- Step 1: Gaussian blur on source graphic -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blurred"/>
      <!-- Step 2: Color matrix — saturate and shift hue toward cyan -->
      <feColorMatrix in="blurred" type="matrix"
        values="0.6  0.4  0.2  0  0
                0.1  0.9  0.3  0  0
                0.2  0.3  1.2  0  0
                0    0    0    1  0"
        result="colorShifted"/>
      <!-- Step 3: Composite blurred+colorshifted over original -->
      <feComposite in="colorShifted" in2="SourceGraphic"
                   operator="over" result="composited"/>
      <!-- Step 4: Drop shadow on the composited result -->
      <feDropShadow in="composited" dx="6" dy="6" stdDeviation="4"
                    flood-color="#000033" flood-opacity="0.7"/>
    </filter>

    <!-- Simpler glow filter for accent elements -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.4
                0 0 0 0 0.8
                0 0 0 0 1
                0 0 0 1 0"
        result="glowColor"/>
      <feComposite in="SourceGraphic" in2="glowColor" operator="over"/>
    </filter>

    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="50%"  stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#6bcb77"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="#080818"/>

  <!-- Group of shapes with the complex filter stack applied -->
  <g filter="url(#complexStack)">
    <!-- Large background rect -->
    <rect x="50" y="50" width="300" height="200" rx="16" fill="url(#grad1)"/>
    <!-- Overlapping circles -->
    <circle cx="140" cy="150" r="60" fill="#4ecdc4" opacity="0.85"/>
    <circle cx="220" cy="130" r="50" fill="#ff6b6b" opacity="0.80"/>
    <circle cx="290" cy="170" r="45" fill="#45b7d1" opacity="0.85"/>
    <!-- Inner triangle -->
    <polygon points="200,70 270,190 130,190" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Accent shapes with glow filter (no complex stack) -->
  <g filter="url(#glow)">
    <circle cx="100" cy="320" r="28" fill="#4fc3f7" opacity="0.9"/>
    <rect x="155" y="295" width="90" height="50" rx="10" fill="#81c784" opacity="0.9"/>
    <polygon points="320,295 350,345 290,345" fill="#ffb74d" opacity="0.9"/>
  </g>

  <!-- Unfiltered label -->
  <text x="200" y="390" text-anchor="middle" font-family="monospace" font-size="11"
        fill="#555">feGaussianBlur → feColorMatrix → feComposite → feDropShadow</text>
</svg>
