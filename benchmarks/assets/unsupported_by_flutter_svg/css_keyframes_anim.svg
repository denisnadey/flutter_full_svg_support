<!-- Source: generated for full_svg_flutter benchmarks -->
<!-- Tests: CSS @keyframes with animation property — NOT supported by flutter_svg.
     Multiple animated properties: transform, opacity, fill, stroke-dashoffset, filter. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <style>
    @keyframes orbitRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes fadeInOut {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes colorShift {
      0%   { fill: #ff0080; stroke: #ff80c0; }
      25%  { fill: #8000ff; stroke: #c080ff; }
      50%  { fill: #0080ff; stroke: #80c0ff; }
      75%  { fill: #00ff80; stroke: #80ffc0; }
      100% { fill: #ff0080; stroke: #ff80c0; }
    }

    @keyframes dashDraw {
      from { stroke-dashoffset: 500; }
      to   { stroke-dashoffset: 0; }
    }

    @keyframes scaleBreath {
      0%   { transform: scale(1);   }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1);   }
    }

    @keyframes slideIn {
      from { transform: translateX(-120px); opacity: 0; }
      to   { transform: translateX(0px);   opacity: 1; }
    }

    @keyframes morphOpacity {
      0%,100% { opacity: 1; }
      33%     { opacity: 0.1; }
      66%     { opacity: 0.6; }
    }

    /* Orbit system: parent rotates, children stay in position */
    .orbit-system {
      transform-origin: 150px 150px;
      animation: orbitRotate 6s linear infinite;
    }

    .fade-ring {
      animation: fadeInOut 3s ease-in-out infinite;
    }

    .color-rect {
      animation: colorShift 4s linear infinite;
      stroke-width: 3;
    }

    .draw-path {
      stroke-dasharray: 500;
      animation: dashDraw 4s ease-in-out infinite alternate;
    }

    .breathe-circle {
      transform-origin: 150px 150px;
      animation: scaleBreath 2s ease-in-out infinite;
    }

    .slide-bar {
      animation: slideIn 1.5s ease-out forwards;
    }

    .morph-tri {
      animation: morphOpacity 2.5s ease-in-out infinite;
    }
  </style>

  <rect width="300" height="300" fill="#0d0d1a"/>

  <!-- Central breathing circle -->
  <circle class="breathe-circle" cx="150" cy="150" r="50"
          fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.8"/>

  <!-- Orbit system: 4 satellites -->
  <g class="orbit-system">
    <circle cx="150" cy="70"  r="12" fill="#f59e0b"/>
    <circle cx="230" cy="150" r="10" fill="#10b981"/>
    <circle cx="150" cy="230" r="12" fill="#ef4444"/>
    <circle cx="70"  cy="150" r="10" fill="#3b82f6"/>
    <!-- Orbit guide ring -->
    <circle cx="150" cy="150" r="80" fill="none"
            stroke="#ffffff18" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Fade-in/out concentric rings -->
  <circle class="fade-ring" cx="150" cy="150" r="110"
          fill="none" stroke="#f472b6" stroke-width="1.5"
          style="animation-delay: 0s"/>
  <circle class="fade-ring" cx="150" cy="150" r="125"
          fill="none" stroke="#818cf8" stroke-width="1"
          style="animation-delay: 1s"/>
  <circle class="fade-ring" cx="150" cy="150" r="138"
          fill="none" stroke="#34d399" stroke-width="0.8"
          style="animation-delay: 2s"/>

  <!-- Color-shifting rectangles (top bar) -->
  <rect class="color-rect" x="40" y="20" width="220" height="22" rx="6"
        style="animation-duration: 4s"/>

  <!-- Stroke-draw path (decorative wave) -->
  <path class="draw-path"
    d="M20,258 C50,238 80,278 110,258 C140,238 170,278 200,258 C230,238 260,278 290,258"
    fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>

  <!-- Morphing opacity triangles -->
  <polygon class="morph-tri" points="150,100 180,145 120,145"
           fill="#ef4444" style="animation-delay: 0s"/>
  <polygon class="morph-tri" points="150,100 180,145 120,145"
           fill="#3b82f6" style="animation-delay: 0.83s"/>
  <polygon class="morph-tri" points="150,100 180,145 120,145"
           fill="#10b981" style="animation-delay: 1.66s"/>

  <!-- Slide-in label -->
  <rect class="slide-bar" x="60" y="272" width="180" height="18" rx="4"
        fill="#1e3a5f" style="animation-delay: 0.3s"/>
  <text x="150" y="284" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#93c5fd">CSS @keyframes — unsupported in flutter_svg</text>
</svg>
