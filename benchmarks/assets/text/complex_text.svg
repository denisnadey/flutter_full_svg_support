<!-- Source: generated for full_svg_flutter benchmarks -->
<!-- Tests: multiple text elements with varied fonts, sizes, letter-spacing, text-decoration, writing-mode -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1e1e2e"/>

  <!-- Large display heading: serif, wide letter-spacing -->
  <text x="200" y="45"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-weight="bold"
        text-anchor="middle" letter-spacing="4"
        fill="#cdd6f4">TYPOGRAPHY</text>

  <!-- Subtitle: sans-serif, italic, moderate spacing -->
  <text x="200" y="68"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13" font-style="italic"
        text-anchor="middle" letter-spacing="2"
        fill="#a6adc8">SVG text rendering benchmark</text>

  <!-- Divider line -->
  <line x1="40" y1="80" x2="360" y2="80" stroke="#45475a" stroke-width="1"/>

  <!-- Multi-size text block -->
  <text x="40" y="108" font-family="monospace" font-size="22" fill="#89b4fa">Size 22</text>
  <text x="40" y="132" font-family="monospace" font-size="16" fill="#89dceb">Size 16</text>
  <text x="40" y="150" font-family="monospace" font-size="12" fill="#94e2d5">Size 12</text>
  <text x="40" y="164" font-family="monospace" font-size="9"  fill="#a6e3a1">Size 9</text>

  <!-- Decorations column -->
  <text x="180" y="108"
        font-family="Arial, sans-serif" font-size="14"
        text-decoration="underline" fill="#f38ba8">Underline</text>
  <text x="180" y="128"
        font-family="Arial, sans-serif" font-size="14"
        text-decoration="line-through" fill="#fab387">Strikethrough</text>
  <text x="180" y="148"
        font-family="Arial, sans-serif" font-size="14"
        text-decoration="overline" fill="#f9e2af">Overline</text>

  <!-- Letter-spacing variations -->
  <text x="40" y="190"
        font-family="sans-serif" font-size="12"
        letter-spacing="-1" fill="#cba6f7">Tight spacing (-1)</text>
  <text x="40" y="210"
        font-family="sans-serif" font-size="12"
        letter-spacing="3" fill="#f5c2e7">Wide   spacing (+3)</text>

  <!-- Word-spacing -->
  <text x="40" y="232"
        font-family="sans-serif" font-size="12"
        word-spacing="12" fill="#eba0ac">Word   spacing   12px</text>

  <!-- Rotated text label -->
  <text x="370" y="200"
        font-family="Arial, sans-serif" font-size="11"
        text-anchor="middle" fill="#89b4fa"
        transform="rotate(-90, 370, 200)">Rotated 90°</text>

  <!-- Vertical text using writing-mode -->
  <text x="388" y="100"
        font-family="sans-serif" font-size="11"
        writing-mode="tb" fill="#a6e3a1">Vertical</text>

  <!-- Right-to-left text indicator -->
  <text x="40" y="258"
        font-family="serif" font-size="13"
        direction="rtl" unicode-bidi="bidi-override"
        fill="#89dceb">REVERSED TEXT DIRECTION</text>

  <!-- Small-caps simulation with tspan -->
  <text x="40" y="282"
        font-family="Georgia, serif" font-size="13"
        fill="#cdd6f4">
    <tspan font-size="10" baseline-shift="0">S</tspan>
    <tspan font-size="13">MALL </tspan>
    <tspan font-size="10">C</tspan>
    <tspan font-size="13">APS </tspan>
    <tspan font-size="10">S</tspan>
    <tspan font-size="13">IMULATION</tspan>
  </text>
</svg>
