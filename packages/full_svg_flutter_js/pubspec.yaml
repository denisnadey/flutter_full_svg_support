name: full_svg_flutter_js
description: >
  Forked JS runtime for full_svg_flutter — bundles quickjs-ng 0.14.0 and a
  patched FFI bridge. Replaces flutter_js so we get up-to-date QuickJS
  codegen on every platform (fixes SVGator bezier glitch on macOS/iOS where
  flutter_js fell back to JavaScriptCore).
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.0.0
  http: ^1.0.0
  sync_http: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: io.full_svg.flutter_js
        pluginClass: FullSvgFlutterJsPlugin
      ios:
        pluginClass: FullSvgFlutterJsPlugin
      macos:
        pluginClass: FullSvgFlutterJsPlugin
      linux:
        pluginClass: FullSvgFlutterJsPlugin
      windows:
        pluginClass: FullSvgFlutterJsPlugin
  assets:
    - assets/js/
